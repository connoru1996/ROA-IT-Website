    { term: "Alphanumeric", def: "A data type that is a combination of letters and numbers, e.g. postcodes (LN1 3AP).", topic: "TA3" },

    { term: "Biometric", def: "Security devices that use physical characteristics (fingerprint, facial recognition, iris) to verify identity.", topic: "TA4" },

    { term: "Computer Misuse Act", def: "Law making it illegal to access a computer without authorisation or modify data without permission.", topic: "TA4" },

    { term: "Data", def: "Raw, unprocessed facts and figures with no context or meaning.", topic: "TA3" },
    { term: "Data Protection Act", def: "Law controlling how personal data is collected, stored, used, and shared. Includes UK GDPR.", topic: "TA4" },
    { term: "Data Type Check", def: "A validation tool that ensures the correct type of data has been entered (e.g. number, text).", topic: "TA3" },

    { term: "Data Verification", def: "Checking that data entered matches the original source. Checks accuracy.", topic: "TA3" },
